name: Build

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  release:
    name: Release (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: win-x86
            os: windows-latest
            target: i686-pc-windows-msvc
          - name: win-x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
          - name: win-arm64
            os: windows-11-arm
            target: aarch64-pc-windows-msvc
          - name: linux-x64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - name: linux-arm64
            os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - name: linux-riscv
            os: ubuntu-latest
            target: riscv64gc-unknown-linux-gnu
          - name: macos-arm64
            os: macos-15
            target: aarch64-apple-darwin

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup target add ${{ matrix.target }}

      - name: Install RISC-V cross-compiler
        if: matrix.name == 'linux-riscv'
        run: |
          sudo apt-get update
          sudo apt-get install --yes gcc-riscv64-linux-gnu g++-riscv64-linux-gnu libc6-dev-riscv64-cross
          echo "CARGO_TARGET_RISCV64GC_UNKNOWN_LINUX_GNU_LINKER=riscv64-linux-gnu-gcc" >> "$GITHUB_ENV"

      - name: Cache Cargo data
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: ${{ runner.os }}-${{ runner.arch }}-${{ matrix.name }}-cargo-build-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-${{ matrix.name }}-cargo-build-

      - name: Build size-optimized release
        run: cargo build --locked --release --features full --target ${{ matrix.target }}
